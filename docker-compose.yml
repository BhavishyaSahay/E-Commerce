version: "3.8"

services:
  backend:
    image: bhavihsyasahay/shop-backend:latest
    container_name: shop-backend
    environment:
      - MONGODB_URI=mongodb+srv://yash:yash@cluster0.l3nouup.mongodb.net/?appName=Cluster0
      - JWT_SECRET=shopsmart_jwt_secret_key_2024_dummy
      - PORT=5004

  frontend:
    image: bhavihsyasahay/shop-frontend:latest
    container_name: shop-frontend
    depends_on:
      - backend

volumes:
  mongo-data: