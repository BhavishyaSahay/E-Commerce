name: Linting Checks

on:
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'npm'
        cache-dependency-path: |
          client/package-lock.json
          server/package-lock.json

    - name: Lint Client
      run: |
        cd client
        npm ci
        npm run lint

    - name: Lint Server
      run: |
        cd server
        npm ci
        npm run lint
